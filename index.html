<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rubik's Cube - Fixed Colors</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<style>
    body { 
        margin: 0; 
        overflow: hidden; 
        /* Prevents the browser from handling touch for scrolling/zooming */
        touch-action: none;
        background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
    }
    #controls {
        position:absolute;
        bottom: 30px;
        right: 30px;
        display: flex;
        flex-direction: column;
        gap: 15px;
        z-index: 100;
    }
    .icon-btn {
        width: 55px;
        height: 55px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.3);
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        color: white;
        font-size: 24px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .icon-btn:hover {
        background: rgba(255, 255, 255, 0.2);
        transform: scale(1.15) translateY(-5px);
        border-color: rgba(255, 255, 255, 0.6);
    }
    .icon-btn.active {
        background: rgba(0, 210, 255, 0.3);
        border-color: #00d2ff;
        box-shadow: 0 0 20px rgba(0, 210, 255, 0.6);
        color: #00d2ff;
    }
</style>
</head>
<body>

<div id="controls">
    <div style="height: 10px;"></div> <!-- Spacer -->
    <button class="icon-btn" onclick="scrambleCube()" title="Scramble Cube">🎲</button>
    <button class="icon-btn" onclick="snapCamera()" title="Snap to Face">🎯</button>
    <button class="icon-btn" onclick="resetCube()" title="Reset Cube">↩️</button>
    <button id="hdBtn" class="icon-btn" onclick="toggleHyperdrive()" title="Toggle Hyperdrive">🚀</button>
</div>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({antialias:true, alpha: true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Initialize OrbitControls
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; // Adds a smooth "weight" to the rotation

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const light = new THREE.PointLight(0xffffff, 1);
light.position.set(5,5,5);
scene.add(light);

// Add a second light to illuminate the back/left sides (Orange, Blue, White)
const light2 = new THREE.PointLight(0xffffff, 1);
light2.position.set(-5,-5,-5);
scene.add(light2);

// Space Starfield
const starGeometry = new THREE.BufferGeometry();
const starMaterial = new THREE.PointsMaterial({color: 0xffffff, size: 0.05, transparent: true});
const starVertices = [];
for (let i = 0; i < 5000; i++) {
    const x = (Math.random() - 0.5) * 100;
    const y = (Math.random() - 0.5) * 100;
    const z = (Math.random() - 0.5) * 100;
    starVertices.push(x, y, z);
}
starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
const starField = new THREE.Points(starGeometry, starMaterial);
scene.add(starField);

// Group
const cubeGroup = new THREE.Group();
scene.add(cubeGroup);

const size = 1;
const gap = 0.05;
let cubes = [];

// Create cubes with correct coloring
for (let x=-1; x<=1; x++) {
    for (let y=-1; y<=1; y++) {
        for (let z=-1; z<=1; z++) {

            const geometry = new THREE.BoxGeometry(size, size, size);

            const materials = [
                new THREE.MeshStandardMaterial({color: 0x000000}), // right
                new THREE.MeshStandardMaterial({color: 0x000000}), // left
                new THREE.MeshStandardMaterial({color: 0x000000}), // top
                new THREE.MeshStandardMaterial({color: 0x000000}), // bottom
                new THREE.MeshStandardMaterial({color: 0x000000}), // front
                new THREE.MeshStandardMaterial({color: 0x000000})  // back
            ];

            // Assign colors only to outer faces
            if (x === 1)  materials[0] = new THREE.MeshStandardMaterial({color: 0xff0000}); // Right - Red
            if (x === -1) materials[1] = new THREE.MeshStandardMaterial({color: 0xffa500}); // Left - Orange

            if (y === 1)  materials[2] = new THREE.MeshStandardMaterial({color: 0xffff00}); // Top - Yellow
            if (y === -1) materials[3] = new THREE.MeshStandardMaterial({color: 0xffffff}); // Bottom - White

            if (z === 1)  materials[4] = new THREE.MeshStandardMaterial({color: 0x00ff00}); // Front - Green
            if (z === -1) materials[5] = new THREE.MeshStandardMaterial({color: 0x0000ff}); // Back - Blue

            const cube = new THREE.Mesh(geometry, materials);

            // Add edges (black borders)
            const edges = new THREE.EdgesGeometry(geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({color: 0x000000}));
            cube.add(line);

            cube.position.set(
                x * (size + gap),
                y * (size + gap),
                z * (size + gap)
            );

            cube.userData.initialPosition = cube.position.clone();
            cubeGroup.add(cube);
            cubes.push(cube);
        }
    }
}

let isRotating = false;
let isHyperdrive = false;

function toggleHyperdrive() {
    isHyperdrive = !isHyperdrive;
    const btn = document.getElementById('hdBtn');
    btn.classList.toggle('active');

    // Make the cube glow when Hyperdrive is active
    cubes.forEach(cube => {
        cube.material.forEach(mat => {
            if (isHyperdrive && mat.color.getHex() !== 0x000000) {
                mat.emissive.copy(mat.color);
                mat.emissiveIntensity = 0.7;
            } else {
                mat.emissive.setHex(0x000000);
            }
        });
    });
}

// Rotate layer
function rotateLayer(axis, value, callback, reverse = false) {
    if (isRotating) return;
    isRotating = true;

    const group = new THREE.Group();
    scene.add(group);
    const direction = reverse ? -1 : 1;

    cubes.forEach(cube => {
        if (Math.round(cube.position[axis] / (size + gap)) === value) {
            group.attach(cube);
        }
    });

    let angle = 0;
    const step = 0.1;
    
    function animateRotate() {
        if (angle + step < Math.PI/2) {
            angle += step;
            group.rotation[axis] += step * direction;
            requestAnimationFrame(animateRotate);
        } else {
            // Final snap to exactly 90 degrees and cleanup positions
            group.rotation[axis] += (Math.PI/2 - angle) * direction;
            group.children.slice().forEach(c => {
                cubeGroup.attach(c);
                // Snap coordinates to prevent rounding drift
                c.position.x = Math.round(c.position.x / (size + gap)) * (size + gap);
                c.position.y = Math.round(c.position.y / (size + gap)) * (size + gap);
                c.position.z = Math.round(c.position.z / (size + gap)) * (size + gap);
            });
            scene.remove(group);
            isRotating = false;
            if (callback) callback();
        }
    }
    animateRotate();
}

function scrambleCube() {
    if (isRotating) return;
    const axes = ['x', 'y', 'z'];
    const values = [-1, 1]; // Use -1 and 1 for outer layers
    let moves = 20;

    function nextMove() {
        if (moves <= 0) return;
        const axis = axes[Math.floor(Math.random() * axes.length)];
        const value = values[Math.floor(Math.random() * values.length)];
        moves--;
        rotateLayer(axis, value, nextMove);
    }
    nextMove();
}

function resetCube() {
    if (isRotating) return;
    cubes.forEach(cube => {
        cube.position.copy(cube.userData.initialPosition);
        cube.rotation.set(0, 0, 0);
    });
    // Reset camera view to original position
    controls.reset();
}

function snapCamera() {
    const startPos = camera.position.clone();
    const targetPos = new THREE.Vector3(0, 0, 6);
    const startTime = performance.now();
    const duration = 600; // ms

    function animateSnap(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);
        // Quartic ease-out for a smooth deceleration
        const ease = 1 - Math.pow(1 - progress, 4);

        camera.position.lerpVectors(startPos, targetPos, ease);
        controls.target.set(0, 0, 0);
        if (progress < 1) {
            requestAnimationFrame(animateSnap);
        }
    }
    requestAnimationFrame(animateSnap);
}

// Keyboard controls
window.addEventListener("keydown", (e) => {
    if (e.key === "r") rotateLayer("x", 1);
    if (e.key === "l") rotateLayer("x", -1);
    if (e.key === "u") rotateLayer("y", 1);
});

// Swipe Gestures Logic
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let pointerStart = new THREE.Vector2();
let intersectTarget = null;

renderer.domElement.addEventListener('pointerdown', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    pointerStart.set(e.clientX, e.clientY);

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(cubes);
    if (intersects.length > 0) {
        intersectTarget = intersects[0].object;
        // Temporarily disable OrbitControls so the camera doesn't move while swiping
        controls.enabled = false;
    }
});

window.addEventListener('pointerup', (e) => {
    if (intersectTarget && !isRotating) {
        const deltaX = e.clientX - pointerStart.x;
        const deltaY = e.clientY - pointerStart.y;
        const threshold = 30; // Minimum pixels to trigger a swipe

        if (Math.abs(deltaX) > threshold || Math.abs(deltaY) > threshold) {
            const pos = intersectTarget.position;
            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                // Horizontal swipe -> Rotate the Y-axis layer (at that height)
                const layer = Math.round(pos.y / (size + gap));
                rotateLayer('y', layer, null, deltaX > 0);
            } else {
                // Vertical swipe -> Rotate the X-axis layer (at that column)
                const layer = Math.round(pos.x / (size + gap));
                rotateLayer('x', layer, null, deltaY > 0);
            }
        }
    }
    intersectTarget = null;
    controls.enabled = true;
});

// Animate
function animate() {
    requestAnimationFrame(animate);

    if (isHyperdrive) {
        // Warp speed effect: Move stars toward the camera
        const positions = starGeometry.attributes.position.array;
        for (let i = 0; i < positions.length; i += 3) {
            positions[i + 2] += 1.5; // Z movement speed
            // If star passes the camera, reset it far to the back
            if (positions[i + 2] > 10) positions[i + 2] = -90;
        }
        starGeometry.attributes.position.needsUpdate = true;
        starMaterial.size = 0.15; // Make stars look like streaks/larger
        starField.rotation.z += 0.01; // Add a slight spiral
    } else {
        // Normal mode: slow rotation and twinkle
        starField.rotation.y += 0.0002;
        starField.rotation.x += 0.0001;
        starMaterial.size = 0.04 + Math.abs(Math.sin(Date.now() * 0.002) * 0.02);
    }

    controls.update(); // Required for damping
    renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
